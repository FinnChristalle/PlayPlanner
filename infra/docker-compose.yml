version: "3.9"

services:
  db:
    image: postgres:16
    container_name: playplanner-db
    environment:
      POSTGRES_USER: playplanner
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: playplanner_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playplanner"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

